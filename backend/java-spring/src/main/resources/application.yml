server:
  port: 3008

spring:
  datasource:
    url: jdbc:h2:mem:worldcup
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  sql:
    init:
      mode: always

# To use PostgreSQL instead, comment out the H2 config above and uncomment:
# spring:
#   datasource:
#     url: jdbc:postgresql://localhost:5432/worldcup
#     username: postgres
#     password: postgres
#   jpa:
#     hibernate:
#       ddl-auto: none
#     properties:
#       hibernate:
#         dialect: org.hibernate.dialect.PostgreSQLDialect
